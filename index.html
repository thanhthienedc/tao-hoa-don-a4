<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phần Mềm Tạo Hóa Đơn Gas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #f4f6f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: var(--bg); display: flex; padding: 20px; gap: 20px; }

        /* CỘT NHẬP LIỆU */
        .form-section { background: #fff; width: 400px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); height: 95vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { font-size: 13px; font-weight: bold; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { width: 100%; padding: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; margin-top: 5px; }
        .btn-add { background: #28a745; color: #fff; }
        .btn-ai { background: #17a2b8; color: #fff; }
        .btn-pdf { background: #dc3545; color: #fff; margin-top: 15px; }

        /* CỘT XEM TRƯỚC */
        .preview-section { flex: 1; background: #666; padding: 20px; display: flex; justify-content: center; overflow-y: auto; }
        .bill-template { background: #fff; width: 297mm; min-height: 210mm; padding: 20mm; color: #000; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        /* Cấu hình K80 */
        .bill-template.k80 { width: 72mm; min-height: auto; padding: 5mm; font-size: 11px; }
        .k80 .store-name { font-size: 14px; }
        .k80 .bill-title { font-size: 16px; }
        .k80 .summary { width: 100%; }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #000; padding: 5px; text-align: left; }
    </style>
</head>
<body>

<div class="form-section">
    <h2>NHẬP HÓA ĐƠN</h2>
    <div class="form-group">
        <label>Tổng tiền muốn chia:</label>
        <input type="number" id="i-ai-total" placeholder="Nhập tổng tiền (ví dụ: 1000000)">
        <button class="btn btn-ai" onclick="autoGenerateProducts()">✨ Chia món tự động</button>
    </div>
    <hr style="margin: 15px 0;">
    <div class="form-group">
        <label>Khổ in:</label>
        <select id="i-paper-size" onchange="applyPaperSize()">
            <option value="a4">A4 Ngang</option>
            <option value="k80">K80 (Bill nhiệt)</option>
        </select>
    </div>
    <div id="product-list"></div>
    <button class="btn btn-add" onclick="addProduct()">+ Thêm Sản Phẩm</button>
    <button class="btn btn-pdf" onclick="exportPDF()">💾 LƯU PDF</button>
</div>

<div class="preview-section">
    <div class="bill-template" id="bill-template">
        <div class="store-name" id="b-store">CỬA HÀNG GAS MINH TỰ TB</div>
        <div class="bill-title">HÓA ĐƠN BÁN LẺ</div>
        <table>
            <thead><tr><th>Tên SP</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
            <tbody id="b-product-table"></tbody>
        </table>
        <div class="summary">
            <div>Tổng cộng: <span id="b-total-amount">0đ</span></div>
        </div>
    </div>
</div>

<script>
    let products = [{ name: 'Bình Gas', unit: 'Bình', qty: 1, price: 0 }];

    function autoGenerateProducts() {
        const total = parseFloat(document.getElementById('i-ai-total').value) || 0;
        // Logic chia tỷ lệ: 60% Bình, 20% Van, 20% Dây
        products = [
            { name: 'Bình Gas 12kg', unit: 'Bình', qty: 1, price: Math.round(total * 0.6 / 1000) * 1000 },
            { name: 'Van điều áp', unit: 'Cái', qty: 1, price: Math.round(total * 0.2 / 1000) * 1000 },
            { name: 'Dây dẫn gas', unit: 'Bộ', qty: 1, price: Math.round(total * 0.2 / 1000) * 1000 }
        ];
        renderProductForm();
    }

    function applyPaperSize() {
        const size = document.getElementById('i-paper-size').value;
        const bill = document.getElementById('bill-template');
        size === 'k80' ? bill.classList.add('k80') : bill.classList.remove('k80');
    }

    function renderProductForm() {
        const container = document.getElementById('product-list');
        container.innerHTML = '';
        products.forEach((p, i) => {
            container.innerHTML += `<div style="border:1px solid #ccc; padding:5px; margin-bottom:5px;">
                <input value="${p.name}" oninput="products[${i}].name=this.value; updateBill()">
                <div style="display:flex; gap:5px;">
                    <input type="number" value="${p.qty}" oninput="products[${i}].qty=this.value; updateBill()">
                    <input type="number" value="${p.price}" oninput="products[${i}].price=this.value; updateBill()">
                </div>
            </div>`;
        });
        updateBill();
    }

    function updateBill() {
        const tbody = document.getElementById('b-product-table');
        tbody.innerHTML = '';
        let total = 0;
        products.forEach(p => {
            let thanhTien = p.qty * p.price;
            total += thanhTien;
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.qty}</td><td>${p.price}</td><td>${thanhTien}</td></tr>`;
        });
        document.getElementById('b-total-amount').innerText = total.toLocaleString() + 'đ';
    }

    function addProduct() { products.push({ name: '', unit: '', qty: 1, price: 0 }); renderProductForm(); }

    function exportPDF() {
        const size = document.getElementById('i-paper-size').value;
        const opt = {
            filename: 'HoaDon.pdf',
            jsPDF: { unit: 'mm', format: size === 'k80' ? [80, 200] : 'a4', orientation: size === 'k80' ? 'portrait' : 'landscape' }
        };
        html2pdf().set(opt).from(document.getElementById('bill-template')).save();
    }

    renderProductForm();
</script>
</body>
</html>
