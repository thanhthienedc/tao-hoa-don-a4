<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phần Mềm Hóa Đơn K80</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* GIAO DIỆN CHÍNH */
        body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; padding: 20px; gap: 20px; }
        .form-section { width: 400px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .preview-section { flex: 1; display: flex; justify-content: center; background: #666; padding: 20px; }
        
        /* ĐỊNH DẠNG HÓA ĐƠN K80 */
        .bill-template { width: 80mm; background: #fff; padding: 10px; font-size: 12px; line-height: 1.4; color: #000; }
        .text-center { text-align: center; }
        .bill-header { text-align: center; border-bottom: 1px dashed #000; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th { border-bottom: 1px dashed #000; padding: 5px 0; }
        td { padding: 5px 0; }
        .text-right { text-align: right; }
        
        /* ẨN KHI IN */
        @media print {
            #no-print, .btn { display: none !important; }
            body { background: none; }
            .preview-section { background: none; padding: 0; }
            .bill-template { width: 80mm; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="form-section" id="no-print">
    <h2>NHẬP HÓA ĐƠN</h2>
    <input type="text" id="i-store" placeholder="Tên cửa hàng" value="GAS MINH TỰ" oninput="updateBill()">
    <div id="product-list"></div>
    <button class="btn" onclick="addProduct()">+ Thêm SP</button>
    <hr>
    <button class="btn" onclick="window.print()" style="background: #28a745; color: #fff; border:none; padding:10px; width:100%; cursor:pointer;">🖨 IN HÓA ĐƠN K80</button>
    <button class="btn" onclick="exportPDF()" style="background: #dc3545; color: #fff; border:none; padding:10px; width:100%; margin-top:5px; cursor:pointer;">💾 LƯU PDF</button>
</div>

<div class="preview-section">
    <div class="bill-template" id="bill-template">
        <div class="bill-header">
            <h3 id="b-store">GAS MINH TỰ</h3>
            <p>ĐC: Tân Bình, TP.HCM</p>
        </div>
        <table>
            <thead><tr><th>Tên SP</th><th>SL</th><th>ĐG</th><th>TT</th></tr></thead>
            <tbody id="b-product-table"></tbody>
        </table>
        <div class="text-right" id="b-total">Tổng: 0đ</div>
    </div>
</div>

<script>
    let products = [{ name: 'Gas Petrolimex', qty: 1, price: 450000 }];

    function updateBill() {
        document.getElementById('b-store').innerText = document.getElementById('i-store').value;
        const tbody = document.getElementById('b-product-table');
        tbody.innerHTML = '';
        let total = 0;
        products.forEach((p, i) => {
            let tt = p.qty * p.price;
            total += tt;
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.qty}</td><td>${p.price.toLocaleString()}</td><td>${tt.toLocaleString()}</td></tr>`;
        });
        document.getElementById('b-total').innerText = 'Tổng: ' + total.toLocaleString() + 'đ';
    }

    function addProduct() {
        products.push({ name: 'Sản phẩm mới', qty: 1, price: 0 });
        updateBill();
    }

    function exportPDF() {
        html2pdf().set({ jsPDF: { unit: 'mm', format: [80, 200] } }).from(document.getElementById('bill-template')).save();
    }

    updateBill();
</script>
</body>
</html>
