<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phần Mềm Tạo Hóa Đơn</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f6f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .container { display: flex; width: 100%; max-width: 1400px; gap: 20px; align-items: flex-start; }
        
        /* CỘT TRÁI: BẢNG NHẬP LIỆU */
        .form-section { background: #fff; width: 400px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .product-inputs { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 4px; background: #fafafa; }
        .btn { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: #fff; }
        .btn-pdf { background: #dc3545; color: #fff; margin-top: 10px; }
        .btn-k80 { background: #007bff; color: #fff; }

        /* CỘT PHẢI: PREVIEW */
        .preview-section { flex: 1; overflow-x: auto; background: #666; padding: 20px; border-radius: 8px; display: flex; justify-content: center; }
        .bill-template { background: #fff; width: 297mm; min-height: 210mm; padding: 20mm; color: #000; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        /* CSS CHO K80 */
        .bill-template.k80 { width: 80mm; min-height: auto; padding: 5mm; font-size: 10px; }
        .bill-template.k80 .store-name { font-size: 14px; }
        .bill-template.k80 .barcode { font-size: 30px; }
        .bill-template.k80 table { font-size: 9px; }

        /* BẢNG & TEXT */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #000; padding: 5px; text-align: left; }
        .summary { width: 300px; margin-left: auto; }
        .summary-row { display: flex; justify-content: space-between; }
        .footer { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>NHẬP THÔNG TIN</h2>
        <div class="form-group"><label>Tên cửa hàng</label><input type="text" id="i-store" value="CỬA HÀNG GAS MINH TỰ TB" oninput="updateBill()"></div>
        <div class="form-group"><label>Khách hàng</label><input type="text" id="i-customer" value="Trần Thanh Thảo" oninput="updateBill()"></div>
        <hr>
        <h3>Danh sách sản phẩm</h3>
        <div id="product-list"></div>
        <button class="btn btn-add" onclick="addProduct()">+ Thêm Sản Phẩm</button>
        <hr>
        <button class="btn btn-k80" onclick="exportPDF('k80')">🖨️ XUẤT K80 (Máy in nhiệt)</button>
        <button class="btn btn-pdf" onclick="exportPDF('a4')">💾 XUẤT A4 NGANG</button>
    </div>

    <div class="preview-section">
        <div class="bill-template" id="bill-template">
            <div class="store-name" id="b-store">CỬA HÀNG GAS MINH TỰ TB</div>
            <div style="text-align: center; margin: 10px 0;">
                <div style="font-size: 20px; font-weight: bold;">HÓA ĐƠN BÁN LẺ</div>
                <div class="barcode">*0901263661*</div>
            </div>
            <div>Khách hàng: <span id="b-customer">Trần Thanh Thảo</span></div>
            <table>
                <thead><tr><th>STT</th><th>Tên</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
                <tbody id="b-product-table"></tbody>
            </table>
            <div class="summary" id="b-summary"></div>
            <div class="footer">CẢM ƠN QUÝ KHÁCH</div>
        </div>
    </div>
</div>

<script>
    let products = [{ name: 'Sản phẩm mẫu', unit: 'Cái', qty: 1, price: 100000 }];

    function renderProductForm() {
        const container = document.getElementById('product-list');
        container.innerHTML = '';
        products.forEach((p, index) => {
            container.innerHTML += `
                <div class="product-inputs">
                    <input type="text" value="${p.name}" oninput="products[${index}].name=this.value; updateBill()">
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="number" value="${p.qty}" oninput="products[${index}].qty=Number(this.value); updateBill()">
                        <input type="number" value="${p.price}" oninput="products[${index}].price=Number(this.value); updateBill()">
                    </div>
                </div>`;
        });
        updateBill();
    }

    function updateBill() {
        document.getElementById('b-store').innerText = document.getElementById('i-store').value;
        document.getElementById('b-customer').innerText = document.getElementById('i-customer').value;
        const tbody = document.getElementById('b-product-table');
        tbody.innerHTML = '';
        let total = 0;
        products.forEach((p, i) => {
            let tt = p.qty * p.price;
            total += tt;
            tbody.innerHTML += `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.qty}</td><td>${p.price.toLocaleString()}</td><td>${tt.toLocaleString()}</td></tr>`;
        });
        document.getElementById('b-summary').innerHTML = `<div class="summary-row"><b>Tổng:</b> <b>${total.toLocaleString()}đ</b></div>`;
    }

    function addProduct() { products.push({ name: '', unit: 'Cái', qty: 1, price: 0 }); renderProductForm(); }

    function exportPDF(type) {
        const element = document.getElementById('bill-template');
        const isK80 = (type === 'k80');
        if (isK80) element.classList.add('k80');
        
        const opt = {
            margin: isK80 ? 2 : 10,
            filename: isK80 ? 'HoaDon_K80.pdf' : 'HoaDon_A4.pdf',
            jsPDF: { unit: 'mm', format: isK80 ? [210, 80] : 'a4', orientation: isK80 ? 'portrait' : 'landscape' }
        };
        
        html2pdf().set(opt).from(element).save().then(() => element.classList.remove('k80'));
    }

    renderProductForm();
</script>
</body>
</html>
